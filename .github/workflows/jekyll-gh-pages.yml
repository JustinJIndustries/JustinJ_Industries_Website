# Build and deploy the explicit public artifact to GitHub Pages.
name: Deploy deterministic public site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install validation dependencies
        run: npm ci
      - name: Locate Chrome sandbox
        id: chrome_sandbox
        shell: bash
        run: |
          set -euo pipefail

          if chrome="$(command -v google-chrome)"; then
            :
          elif chrome="$(command -v google-chrome-stable)"; then
            :
          else
            echo "::error::Google Chrome was not found on the runner."
            exit 1
          fi

          chrome="$(readlink -f "$chrome")"
          sandbox="$(dirname "$chrome")/chrome-sandbox"

          test -f "$chrome"
          test -x "$chrome"
          test -f "$sandbox"
          test -x "$sandbox"
          test -u "$sandbox"
          test "$(stat -c '%U' "$sandbox")" = "root"

          printf 'Runner OS: %s\n' "${RUNNER_OS:-unknown}"
          printf 'Runner image: %s %s\n' "${ImageOS:-unknown}" "${ImageVersion:-unknown}"
          printf 'Chrome executable: %s\n' "$chrome"
          "$chrome" --version
          stat -c 'Chrome sandbox: %n owner=%U:%G mode=%a' "$sandbox"
          printf 'path=%s\n' "$sandbox" >> "$GITHUB_OUTPUT"
      - name: Validate source
        env:
          CHROME_DEVEL_SANDBOX: ${{ steps.chrome_sandbox.outputs.path }}
        run: npm run check
      - name: Build public artifact
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
