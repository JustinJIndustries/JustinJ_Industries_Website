# Build and deploy the explicit public artifact to GitHub Pages.
name: Deploy deterministic public site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install validation dependencies
        run: npm ci
      - name: Verify sandboxed system Chrome
        id: system_chrome
        shell: bash
        run: |
          set -euo pipefail

          if chrome="$(command -v google-chrome)"; then
            :
          elif chrome="$(command -v google-chrome-stable)"; then
            :
          else
            echo "::error::Google Chrome was not found on the runner."
            exit 1
          fi

          chrome="$(readlink -f "$chrome")"
          test -f "$chrome"
          test -x "$chrome"

          case "$chrome" in
            *$'\n'* | *$'\r'*)
              echo "::error::Chrome executable path contains a line break."
              exit 1
              ;;
          esac

          printf 'Runner OS: %s\n' "${RUNNER_OS:-unknown}"
          printf 'Runner image: %s %s\n' "${ImageOS:-unknown}" "${ImageVersion:-unknown}"
          printf 'Chrome executable: %s\n' "$chrome"
          "$chrome" --version

          if [[ -e /etc/apparmor.d/chrome ]]; then
            stat -c 'AppArmor Chrome profile: %n owner=%U:%G mode=%a' /etc/apparmor.d/chrome
            if [[ -r /etc/apparmor.d/chrome ]] && grep -Fq '/opt/google/chrome/chrome' /etc/apparmor.d/chrome; then
              echo "AppArmor system Chrome rule: present"
            else
              echo "AppArmor system Chrome rule: not detected"
            fi
          else
            echo "AppArmor Chrome profile: absent"
          fi

          if [[ -r /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            printf 'AppArmor restrict_unprivileged_userns: %s\n' "$(</proc/sys/kernel/apparmor_restrict_unprivileged_userns)"
          else
            echo "AppArmor restrict_unprivileged_userns: unavailable"
          fi

          smoke_output="${RUNNER_TEMP:?}/system-chrome-smoke.html"
          smoke_profile="${RUNNER_TEMP:?}/system-chrome-smoke-profile"
          timeout 30s "$chrome" \
            --headless=new \
            --disable-gpu \
            --user-data-dir="$smoke_profile" \
            --dump-dom \
            about:blank > "$smoke_output"
          test -s "$smoke_output"
          echo "Sandboxed system Chrome smoke test: PASS"

          printf 'path=%s\n' "$chrome" >> "$GITHUB_OUTPUT"
      - name: Validate source
        env:
          DEBUG: puppeteer:browsers:launcher
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.system_chrome.outputs.path }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const {realpathSync} = require("node:fs");
          const {createRequire} = require("node:module");

          const pa11yEntry = require.resolve("pa11y");
          const pa11yRequire = createRequire(pa11yEntry);
          const puppeteer = pa11yRequire("puppeteer");
          const expected = realpathSync(process.env.PUPPETEER_EXECUTABLE_PATH);
          const resolved = realpathSync(puppeteer.executablePath());
          const pa11yVersion = require("pa11y/package.json").version;
          const puppeteerVersion = pa11yRequire("puppeteer/package.json").version;
          const {PUPPETEER_REVISIONS} = pa11yRequire("puppeteer-core/internal/revisions.js");

          console.log(`Pa11y version: ${pa11yVersion}`);
          console.log(`Puppeteer version: ${puppeteerVersion}`);
          console.log(`Puppeteer bundled Chrome: ${PUPPETEER_REVISIONS.chrome}`);
          console.log(`Pa11y-resolved Chrome executable: ${resolved}`);

          if (resolved !== expected) {
            throw new Error(`Puppeteer resolved ${resolved}, expected ${expected}`);
          }
          NODE
          npm run check
      - name: Build public artifact
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
